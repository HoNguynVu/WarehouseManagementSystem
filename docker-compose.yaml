version: '3.8'

services:
  # 1. Bưu điện RabbitMQ
  rabbitmq:
    image: rabbitmq:3-management
    container_name: wms-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: always

  # 2. Redis Cache 
  redis:
    image: redis:alpine
    container_name: wms-redis
    ports:
      - "6379:6379"
    restart: always

  # 3. Database PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: wms-postgres
    environment:
      POSTGRES_USER: ${DB_POSTGRES_USER}         
      POSTGRES_PASSWORD: ${DB_POSTGRES_PASS}
      POSTGRES_DB: warehouse_db      
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  # 4. Database MongoDb
  mongodb:
    image: mongo:latest
    container_name: wms-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_MONGO_PASS}
    ports:
      - "27018:27017"
    volumes:
      - mongodata:/data/db
    restart: always


# Khai báo ổ cứng ảo cho Docker
volumes:
  pgdata:
  mongodata: